spring.config.import=optional:classpath:secrets.properties

spring.application.name=BookingApplication

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:${LOCAL_DATASOURCE_URL}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${LOCAL_DATASOURCE_USERNAME}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${LOCAL_DATASOURCE_PASSWORD}}

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# API
server.servlet.context-path=/api
server.address=0.0.0.0

# JWT
jwt.secret=${JWT_SECRET:${LOCAL_JWT_SECRET}}
jwt.expirationMillis=7200000

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:${LOCAL_CLOUDINARY_CLOUD_NAME}}
cloudinary.api-key=${CLOUDINARY_API_KEY:${LOCAL_CLOUDINARY_API_KEY}}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:${LOCAL_CLOUDINARY_API_SECRET}}

# Uploads
spring.servlet.multipart.max-request-size=100MB